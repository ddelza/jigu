<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; background: #f6f8fa; color: #222; }
    h1 { font-size: 20px; text-align: center; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    label { display: block; font-weight: bold; margin: 12px 0 6px; }
    input[type=text] { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
    button { background: #2d6cdf; color: #fff; border: none; padding: 12px 18px; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 14px; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .hidden { display: none; }
    .msg { padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
    .msg.error { background: #ffe5e5; color: #b00000; }
    .msg.success { background: #e3f7e8; color: #1a7a36; }
    .step-label { font-size: 13px; color: #777; margin-bottom: 6px; }
    .sub-section-title { font-size: 14px; font-weight: bold; color: #2d6cdf; margin: 18px 0 8px; border-top: 1px dashed #e2e6f0; padding-top: 14px; }
    .sub-section-title:first-of-type { margin-top: 4px; border-top: none; padding-top: 0; }
    .result-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
    .meta { font-size: 12px; color: #888; margin-bottom: 10px; }
    .field { margin-bottom: 12px; }
    .field-label { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 4px; }
    .field-value { background: #f6f8fa; border-radius: 8px; padding: 10px; font-size: 14px; white-space: pre-wrap; line-height: 1.5; }
    .empty { color: #999; font-size: 14px; padding: 12px 0; }
    .learning-item { border-top: 1px solid #eee; padding-top: 12px; margin-top: 12px; }
    .blank-qa { background: #f6f8fa; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
    .blank-q { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 4px; }
    .blank-a { font-size: 14px; font-weight: bold; color: #1a4fbf; }
    .score-total-row { display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap; }
    .score-total { font-size: 28px; font-weight: bold; color: #2d6cdf; margin-bottom: 4px; }
    .score-total span { font-size: 16px; color: #888; font-weight: normal; }
    .score-list { margin-top: 14px; }
    .score-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .score-row:last-child { border-bottom: none; }
    .score-badge { font-weight: bold; padding: 3px 10px; border-radius: 999px; font-size: 13px; white-space: nowrap; margin-left: 10px; }
    .score-badge.got { background: #e3f7e8; color: #1a7a36; }
    .score-badge.missed { background: #f0f0f0; color: #999; }
    .point-badge { font-size: 12px; font-weight: bold; padding: 2px 8px; border-radius: 999px; margin-left: 6px; }
    .point-badge.got { background: #e3f7e8; color: #1a7a36; }
    .point-badge.missed { background: #f0f0f0; color: #999; }
    .hint-text { font-size: 12px; font-weight: normal; color: #888; }
    .pending { background: #fff7e0; color: #9a7600; }
    .explain-box { background: #f5f8ff; border: 1px solid #dbe6ff; border-radius: 8px; padding: 10px 12px; font-size: 12.5px; color: #555; line-height: 1.6; margin-bottom: 10px; }
    .task-link-bar a {
      display: inline-block; font-size: 13px; font-weight: bold; color: #b00000;
      background: #ffe9e9; border: 1px solid #ffc4c4; border-radius: 999px; padding: 7px 16px; text-decoration: none;
      animation: pulseLink 1.6s ease-in-out infinite;
    }
    .task-link-bar a:hover { background: #ffd6d6; }
    @keyframes pulseLink { 0%, 100% { box-shadow: 0 0 0 rgba(255,0,0,0); } 50% { box-shadow: 0 0 10px rgba(255,80,80,.5); } }
    .value-desc-box, .perspective-desc-box {
      background: #f5f8ff; border: 1px solid #dbe6ff; border-radius: 8px; padding: 10px 12px;
      font-size: 13px; color: #444; line-height: 1.6; margin-top: 6px;
    }
    .value-desc-box .vd-title, .perspective-desc-box .pd-title { font-weight: bold; color: #2d6cdf; margin-bottom: 4px; }
    .perspective-desc-box .pd-solutions { margin-top: 6px; font-size: 12.5px; color: #555; }
    .perspective-desc-box .pd-solutions b { color: #b8860b; }
  </style>
</head>
<body>
  <h1>📋 내 제출 내용 확인</h1>

  <!-- STEP 0: 학번/이름 입력 -->
  <div id="step0" class="card">
    <div class="step-label">학번과 이름을 입력하면 내가 제출한 답안을 볼 수 있습니다.</div>
    <label>학번</label>
    <input type="text" id="studentId" placeholder="예: 3101 (3학년 1반 1번)">
    <label>이름</label>
    <input type="text" id="studentName" placeholder="이름 입력">
    <label>비밀번호 <span class="hint-text">(이메일로 "kbs"가 보낸 개인 비밀번호 4자리 확인, 없으면 왼쪽에 '더보기' 눌러서 스팸함 확인)</span></label>
    <input type="password" id="studentPassword" placeholder="비밀번호 입력">
    <div id="step0-msg"></div>
    <button onclick="loadMySubmissions()" id="loadBtn">확인하기</button>
  </div>

  <!-- STEP 0.5: 점수 요약 -->
  <div id="scoreCard" class="card hidden">
    <div class="result-title">🏆 내 점수</div>
    <div class="score-total-row">
      <div class="score-total" id="scoreTotal"></div>
      <div class="task-link-bar">
        <a href="https://ddelza.github.io/jigu/tasks.html" target="_blank">아직 제출하지 않은 것이 있나요? →</a>
      </div>
    </div>
    <div class="score-list" id="scoreList"></div>
  </div>

  <!-- STEP 1: 1차시 핵심 개념일지 (본인 분과 + 다른 분과 통합) -->
  <div id="conceptCard" class="card hidden">
    <div class="result-title">📝 1차시-핵심 개념일지 (빈칸 채우기)</div>
    <div class="sub-section-title">✏️ 본인 분과</div>
    <div id="ownContent"></div>
    <div class="sub-section-title">👂 다른 분과</div>
    <div id="learningContent"></div>
  </div>

  <!-- STEP 2: 인과 사슬 & 가치 관점 제출 결과 -->
  <div id="valueCard" class="card hidden">
    <div class="result-title">🔺 2차시-인과 사슬 작성 & 가치 관점 선택</div>
    <div id="valueContent"></div>
  </div>

  <!-- STEP 3: 3차시 지구온난화 긴급회의(패들렛) 제출 결과 -->
  <div id="padletCard" class="card hidden">
    <div class="result-title">🗂️ 3차시 - 지구온난화 긴급회의</div>
    <div id="padletContent"></div>
  </div>

    emoji: '💰',

function findValueDesc(valueStr) {
  if (!valueStr) return null;
  return VALUES.find(function (v) {
    return valueStr.indexOf(v.name) !== -1;
  }) || null;
}

function getSectionIdByTitle(title) {
  for (var id in SECTION_TITLES) {
    if (SECTION_TITLES[id] === title) return id;
  }
  return null;
}

function renderBlanksWithPrompts(sectionTitle, blanksStr) {
  var sectionId = getSectionIdByTitle(sectionTitle);
  var answers = (blanksStr || '').split(' / ');
  var prompts = sectionId ? BLANK_PROMPTS[sectionId] : null;

  if (!prompts) {
    return '<div class="field-value">' + escapeHtml_(blanksStr) + '</div>';
  }

  return prompts.map(function (q, i) {
    return '<div class="blank-qa">' +
      '<div class="blank-q">' + (i + 1) + '. ' + escapeHtml_(q) + '</div>' +
      '<div class="blank-a">✏️ ' + escapeHtml_(answers[i] || '') + '</div>' +
      '</div>';
  }).join('');
}

function apiGet(params) {
  var qs = Object.keys(params).map(function (k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  return fetch(APP_URL + '?' + qs).then(function (r) { return r.json(); });
}

function loadMySubmissions() {
  var id = document.getElementById('studentId').value.trim();
  var name = document.getElementById('studentName').value.trim();
  var password = document.getElementById('studentPassword').value.trim();
  var msg = document.getElementById('step0-msg');
  var btn = document.getElementById('loadBtn');
  msg.innerHTML = '';

  if (!id || !name || !password) {
    msg.innerHTML = '<div class="msg error">학번, 이름, 비밀번호를 모두 입력해주세요.</div>';
    return;
  }

  btn.disabled = true;
  msg.innerHTML = '<div class="msg success">조회 중...</div>';

  apiGet({ action: 'getMySubmissions', studentId: id, studentName: name, password: password }).then(function (res) {
    btn.disabled = false;
    if (!res.valid) {
      msg.innerHTML = '<div class="msg error">' + res.message + '</div>';
      return;
    }
    msg.innerHTML = '';
    renderScore(res.own, res.learning, res.valueScore);
    renderOwn(res.own);
    renderLearning(res.learning);
    renderValue(res.valueScore);
    renderPadlet(res.valueScore);
  }).catch(function (err) {
    btn.disabled = false;
    msg.innerHTML = '<div class="msg error">오류: ' + err.message + '</div>';
  });
}

function isGradedNumber(v) {
  return v !== null && v !== undefined && v !== '' && !isNaN(Number(v));
}

function renderScore(own, learning, valueScore) {
  var card = document.getElementById('scoreCard');
  card.classList.remove('hidden');

  var hasOwnQuiz = !!own;
  var hasAiCheck = !!(own && own.aiCheck && own.aiCheck.trim().length > 0);
  var hasLifeAnswer = !!(own && own.lifeAnswer && own.lifeAnswer.trim().length > 0);
  var learningCount = (learning || []).length;

  var items = [
    { label: '자신의 분과 퀴즈 풀기', got: hasOwnQuiz, point: 1 },
    { label: 'AI 검증하기', got: hasAiCheck, point: 1 },
    { label: '지구온난화가 삶에 미치는 영향 인과단계', got: hasLifeAnswer, point: 2 },
    { label: '다른 분과 퀴즈 풀기 1', got: learningCount >= 1, point: 1 },
    { label: '다른 분과 퀴즈 풀기 2', got: learningCount >= 2, point: 1 },
    { label: '다른 분과 퀴즈 풀기 3', got: learningCount >= 3, point: 1 }
  ];

  var total = items.reduce(function (sum, it) { return sum + (it.got ? it.point : 0); }, 0);
  var max = items.reduce(function (sum, it) { return sum + it.point; }, 0);

  var gradedItems = [
    { label: '기후위기 인과 찾기', score: valueScore && valueScore.scoreCausal, max: 2 },
    { label: '나의 가치가 중요한 이유 서술', score: valueScore && valueScore.scoreReasonImportance, max: 2 },
    { label: '나의 가치와 기후위기 해결 관점 연결', score: valueScore && valueScore.scoreReasonConnection, max: 2 },
    { label: '문제의 인과적 분석 (3차시)', score: valueScore && valueScore.causalAnalysisScore, max: 1 },
    { label: '나의 관점에서 정책 제안하기 (3차시)', score: valueScore && valueScore.policyProposalScore, max: 2 },
    { label: '질문형 댓글 (3차시)', score: valueScore && valueScore.commentScore, max: 3 }
  ];
  gradedItems.forEach(function (it) {
    max += it.max;
    if (isGradedNumber(it.score)) total += Number(it.score);
  });

  document.getElementById('scoreTotal').innerHTML = total + '<span> / ' + max + '점</span>';
  document.getElementById('scoreList').innerHTML =
    items.map(function (it) {
      return '<div class="score-row">' +
        '<span>' + it.label + '</span>' +
        '<span class="score-badge ' + (it.got ? 'got' : 'missed') + '">' + (it.got ? '✅ ' + it.point + '점' : '미완료 0점') + '</span>' +
        '</div>';
    }).join('') +
    gradedItems.map(function (it) {
      var badgeClass = isGradedNumber(it.score) ? 'got' : 'pending';
      var badgeText = isGradedNumber(it.score) ? ('✅ ' + Number(it.score) + '점') : '채점 대기중';
      return '<div class="score-row">' +
        '<span>' + it.label + ' (' + it.max + '점)</span>' +
        '<span class="score-badge ' + badgeClass + '">' + badgeText + '</span>' +
        '</div>';
    }).join('');
}

function renderOwn(own) {
  var card = document.getElementById('conceptCard');
  var content = document.getElementById('ownContent');
  card.classList.remove('hidden');

  if (!own) {
    content.innerHTML = '<div class="empty">아직 제출한 기록이 없습니다.</div>';
    return;
  }

  var hasAiCheck = !!(own.aiCheck && own.aiCheck.trim().length > 0);
  var hasLifeAnswer = !!(own.lifeAnswer && own.lifeAnswer.trim().length > 0);

  content.innerHTML =
    '<div class="meta">제출 시각: ' + own.timestamp + ' / 분과: ' + own.section + '</div>' +
    '<div class="field"><div class="field-label">빈칸 채우기 <span class="point-badge got">✅ 1점</span></div>' + renderBlanksWithPrompts(own.section, own.blanks) + '</div>' +
    '<div class="field"><div class="field-label">💡 AI 교차 검증 기록 <span class="point-badge ' + (hasAiCheck ? 'got">✅ 1점' : 'missed">미완료 0점') + '</span></div><div class="field-value">' + escapeHtml_(own.aiCheck) + '</div></div>' +
    '<div class="field"><div class="field-label">➡️ 인과 단계 서술 <span class="point-badge ' + (hasLifeAnswer ? 'got">✅ 2점' : 'missed">미완료 0점') + '</span></div><div class="field-value">' + escapeHtml_(own.lifeAnswer) + '</div></div>';
}

function renderLearning(learning) {
  var card = document.getElementById('conceptCard');
  var content = document.getElementById('learningContent');
  card.classList.remove('hidden');

  if (!learning || learning.length === 0) {
    content.innerHTML = '<div class="empty">아직 제출한 기록이 없습니다.</div>';
    return;
  }

  content.innerHTML = learning.map(function (item, idx) {
    return '<div class="learning-item' + (idx === 0 ? ' first' : '') + '">' +
      '<div class="meta">제출 시각: ' + item.timestamp + ' / 분과: ' + item.section +
      ' <span class="point-badge got">다른 분과 퀴즈 풀기 ' + (idx + 1) + ' · ✅ 1점</span></div>' +
      renderBlanksWithPrompts(item.section, item.blanks) +
      '</div>';
  }).join('');
}

function renderValue(vs) {
  var card = document.getElementById('valueCard');
  var content = document.getElementById('valueContent');
  card.classList.remove('hidden');

  if (!vs || (!vs.causalChain && !vs.reason)) {
    content.innerHTML = '<div class="empty">아직 제출한 기록이 없습니다.</div>';
    return;
  }

  function scoreBadge(score, max) {
    if (isGradedNumber(score)) return '<span class="point-badge got">✅ ' + Number(score) + '점 / ' + max + '점</span>';
    return '<span class="point-badge pending">채점 대기중 (' + max + '점)</span>';
  }

  content.innerHTML =
    '<div class="field"><div class="field-label">🔗 기후위기 인과 찾기 ' + scoreBadge(vs.scoreCausal, 2) + '</div>' +
    '<div class="field-value">' + escapeHtml_(vs.causalChain) + '</div></div>' +

    '<div class="field"><div class="field-label">💭 내가 평소 중요하게 생각하는 가치 / 선택한 관점</div>' +
    '<div class="field-value">가치: ' + escapeHtml_(vs.value) + '<br>관점: ' + escapeHtml_(vs.perspective) + '</div>' +
    renderValueDescBox(vs.value) +
    renderPerspectiveDescBox(vs.perspective) +
    '</div>' +

    '<div class="field"><div class="field-label">📝 가치와 관점을 연결한 서술</div>' +
    '<div class="explain-box">아래 서술 하나를 가지고 두 가지 기준으로 채점됩니다: ① 내가 고른 가치가 <b>나에게 왜 중요한지</b>를 설명했는지, ② 그 가치가 <b>왜 내가 선택한 관점과 연결되는지</b> 논리적으로 설명했는지.</div>' +
    '<div class="field-value">' + escapeHtml_(vs.reason) + '</div>' +
    '<div style="margin-top:8px;">' +
      '가치가 중요한 이유 ' + scoreBadge(vs.scoreReasonImportance, 2) + '&nbsp;&nbsp;' +
      '가치-관점 연결 ' + scoreBadge(vs.scoreReasonConnection, 2) +
    '</div></div>';
}

function cleanCellText(s) {
  s = String(s || '').trim();
  return (s === '' || s.toUpperCase() === '#N/A') ? '' : s;
}

function renderPadlet(vs) {
  var card = document.getElementById('padletCard');
  var content = document.getElementById('padletContent');
  card.classList.remove('hidden');

  var causalAnalysis = vs ? cleanCellText(vs.causalAnalysis) : '';
  var policyProposal = vs ? cleanCellText(vs.policyProposal) : '';
  var questionComments = vs ? cleanCellText(vs.questionComments) : '';

  if (!causalAnalysis && !policyProposal && !questionComments) {
    content.innerHTML = '<div class="empty">아직 제출한 기록이 없습니다.</div>';
    return;
  }

  function scoreBadge(score, max) {
    if (isGradedNumber(score)) return '<span class="point-badge got">✅ ' + Number(score) + '점 / ' + max + '점</span>';
    return '<span class="point-badge pending">채점 대기중 (' + max + '점)</span>';
  }

  var questions = questionComments.split(' | ').map(function (s) { return s.trim(); }).filter(function (s) { return s.length > 0 && s.toUpperCase() !== '#N/A'; });
  var questionsHtml = questions.length
    ? questions.map(function (q, i) {
        return '<div class="blank-qa"><div class="blank-a">' + (i + 1) + '. ' + escapeHtml_(q) + '</div></div>';
      }).join('')
    : '<div class="empty">아직 작성한 질문형 댓글이 없습니다.</div>';

  content.innerHTML =
    '<div class="field"><div class="field-label">🔗 문제의 인과적 분석 ' + scoreBadge(vs.causalAnalysisScore, 1) + '</div>' +
    '<div class="field-value">' + (causalAnalysis ? escapeHtml_(causalAnalysis) : '<span class="empty">아직 작성하지 않았습니다.</span>') + '</div></div>' +

    '<div class="field"><div class="field-label">🏛️ 나의 관점에서 정책 제안하기 ' + scoreBadge(vs.policyProposalScore, 2) + '</div>' +
    '<div class="field-value">' + (policyProposal ? escapeHtml_(policyProposal) : '<span class="empty">아직 작성하지 않았습니다.</span>') + '</div></div>' +

    '<div class="field"><div class="field-label">💬 질문형 댓글 (' + questions.length + '개) ' + scoreBadge(vs.commentScore, 3) + '</div>' +
    questionsHtml + '</div>';
}

function renderValueDescBox(valueStr) {
  var v = findValueDesc(valueStr);
  if (!v) return '';
  return '<div class="value-desc-box"><div class="vd-title">' + v.emoji + ' ' + v.name + ' (' + v.eng + ')</div>💡 의미: ' + v.desc + '</div>';
}

function renderPerspectiveDescBox(perspectiveStr) {
  var p = PERSPECTIVE_DATA[perspectiveStr];
  if (!p) return '';
  return '<div class="perspective-desc-box">' +
    '<div class="pd-title">' + p.emoji + ' ' + escapeHtml_(perspectiveStr) + '</div>' +
    p.desc +
    '<div class="pd-solutions"><b>해결책 예시</b>: ' + p.solutions + '</div>' +
    '</div>';
}

function escapeHtml_(s) {
  var div = document.createElement('div');
  div.innerText = s || '';
  return div.innerHTML;
}
</script>
</body>
</html>
