<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; background: #f6f8fa; color: #222; }
    h1 { font-size: 20px; text-align: center; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    label { display: block; font-weight: bold; margin: 12px 0 6px; }
    input[type=text] { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
    button { background: #2d6cdf; color: #fff; border: none; padding: 12px 18px; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 14px; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .hidden { display: none; }
    .msg { padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
    .msg.error { background: #ffe5e5; color: #b00000; }
    .msg.success { background: #e3f7e8; color: #1a7a36; }
    .step-label { font-size: 13px; color: #777; margin-bottom: 6px; }
    .result-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
    .meta { font-size: 12px; color: #888; margin-bottom: 10px; }
    .field { margin-bottom: 12px; }
    .field-label { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 4px; }
    .field-value { background: #f6f8fa; border-radius: 8px; padding: 10px; font-size: 14px; white-space: pre-wrap; line-height: 1.5; }
    .empty { color: #999; font-size: 14px; padding: 12px 0; }
    .learning-item { border-top: 1px solid #eee; padding-top: 12px; margin-top: 12px; }
    .blank-qa { background: #f6f8fa; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
    .blank-q { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 4px; }
    .blank-a { font-size: 14px; font-weight: bold; color: #1a4fbf; }
  </style>
</head>
<body>
  <h1>📋 내 제출 내용 확인</h1>

  <!-- STEP 0: 학번/이름 입력 -->
  <div id="step0" class="card">
    <div class="step-label">학번과 이름을 입력하면 내가 제출한 답안을 볼 수 있습니다.</div>
    <label>학번</label>
    <input type="text" id="studentId" placeholder="예: 3101 (3학년 1반 1번)">
    <label>이름</label>
    <input type="text" id="studentName" placeholder="이름 입력">
    <div id="step0-msg"></div>
    <button onclick="loadMySubmissions()" id="loadBtn">확인하기</button>
  </div>

  <!-- STEP 1: 본인 핵심 개념일지 제출 결과 -->
  <div id="ownCard" class="card hidden">
    <div class="result-title">📝 1차 핵심 개념일지 (본인 발표 분과)</div>
    <div id="ownContent"></div>
  </div>

  <!-- STEP 2: 친구 발표 청취 제출 결과 -->
  <div id="learningCard" class="card hidden">
    <div class="result-title">👂 친구 발표 청취 핵심 개념일지</div>
    <div id="learningContent"></div>
  </div>

<script>
var APP_URL = 'https://script.google.com/macros/s/AKfycbwWjFVmcxHzg0GUIbySHl2orXll2siH1I5oAeZNP8VWmYSaVbQ5YOlYEe1o7X7-KcHQ/exec';

var SECTION_TITLES = {
  '1': '🌍 복사 평형 분과',
  '2': '🌧️ 수증기·강수 분과',
  '3': '🌬️ 기압·바람 분과',
  '4': '☁️ 기단·전선 분과'
};
var BLANK_PROMPTS = {
  '1': [
    '지구는 태양으로부터 엄청난 양의 ( ① )를 흡수하고, 동시에 우주로 에너지를 방출하여 온도가 일정하게 유지되는 ( ② ) 상태를 이룹니다. ①에 들어갈 말은?',
    '* 위 문장과 이어집니다. ②에 들어갈 말은? (온도가 일정하게 유지되는 상태의 이름)',
    '지표에서 우주로 방출되는 에너지 중 일부를 대기가 흡수했다가 다시 지표로 방출하여 지구를 따뜻하게 유지하는 현상을 무엇이라 하나요?',
    '이러한 효과를 일으키는 주요 기체인 수증기, ( ), 메테인 등이 있습니다. 빈칸에 들어갈 기체는?',
    '* 위 문장과 이어집니다. 수증기, 이산화탄소, 메테인 등을 묶어서 부르는 이름은?',
    '그러나 인간의 산업 활동(화석 연료 사용 등)으로 인해 대기 중의 ( ) 농도가 급격히 증가했습니다. 빈칸에 들어갈 말은?',
    '그 결과 대기의 보온 효과가 비정상적으로 강화되어 지구의 평균 기온이 점점 빠르게 상승하는 현상을 무엇이라 하나요?'
  ],
  '2': [
    '일정한 온도에서 공기가 최대로 포함할 수 있는 수증기의 양을 무엇이라 하나요?',
    '공기가 위로 상승하면 주변 압력이 낮아져 부피가 커지고 온도는 낮아지는 현상을 무엇이라 하나요?',
    '온도가 이 지점까지 낮아지면 수증기가 응결되기 시작합니다. 이 온도를 무엇이라 하나요?',
    '수증기가 응결되어 만들어지는 것은 무엇인가요?',
    '대기가 머금는 수증기량이 급증하면 한 번에 엄청난 비가 쏟아지는 극단적인 현상이 발생합니다. 이를 무엇이라 하나요?',
    '반대로 비가 오지 않는 지역이 겪게 되는 극심한 현상은 무엇인가요?'
  ],
  '3': [
    '기체가 충돌하면서 단위 면적에 작용하는 힘을 무엇이라 하나요?',
    '지표면이 가열되어 공기가 팽창, 상승하면 무엇이 형성되나요?',
    '지표면이 냉각되어 공기가 수축, 하강하면 무엇이 형성되나요?',
    '기압이 높은 곳에서 낮은 곳으로 이동하는 공기의 수평 이동을 무엇이라 하나요?',
    '온난화로 북극 기온이 크게 상승하면 중위도 지방과의 무엇의 차이가 줄어드나요?',
    '대기 순환의 균형이 깨지면서 한겨울에 발생하는 이상 현상은 무엇인가요?'
  ],
  '4': [
    '공기 덩어리가 한 장소에 오래 머물러 지표면의 기온/습도 속성을 띠게 된 것을 무엇이라 하나요?',
    '성질이 다른 두 기단이 만나는 경계면을 무엇이라 하나요?',
    '세력이 비슷한 두 기단이 오랫동안 머물 때 형성되는 전선은 무엇인가요? (장마전선이 대표적)',
    '우리나라 한여름에 영향을 주는 고온다습한 기단의 이름은?',
    '온난화로 기단의 경계가 무너지면서 무엇의 경계가 모호해지나요? (봄,여름,가을,겨울)',
    '전선이 이동하지 못하고 한곳에 머무는 현상을 무엇이라 하나요?'
  ]
};

function getSectionIdByTitle(title) {
  for (var id in SECTION_TITLES) {
    if (SECTION_TITLES[id] === title) return id;
  }
  return null;
}

function renderBlanksWithPrompts(sectionTitle, blanksStr) {
  var sectionId = getSectionIdByTitle(sectionTitle);
  var answers = (blanksStr || '').split(' / ');
  var prompts = sectionId ? BLANK_PROMPTS[sectionId] : null;

  if (!prompts) {
    return '<div class="field-value">' + escapeHtml_(blanksStr) + '</div>';
  }

  return prompts.map(function (q, i) {
    return '<div class="blank-qa">' +
      '<div class="blank-q">' + (i + 1) + '. ' + escapeHtml_(q) + '</div>' +
      '<div class="blank-a">✏️ ' + escapeHtml_(answers[i] || '') + '</div>' +
      '</div>';
  }).join('');
}

function apiGet(params) {
  var qs = Object.keys(params).map(function (k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  return fetch(APP_URL + '?' + qs).then(function (r) { return r.json(); });
}

function loadMySubmissions() {
  var id = document.getElementById('studentId').value.trim();
  var name = document.getElementById('studentName').value.trim();
  var msg = document.getElementById('step0-msg');
  var btn = document.getElementById('loadBtn');
  msg.innerHTML = '';

  if (!id || !name) {
    msg.innerHTML = '<div class="msg error">학번과 이름을 모두 입력해주세요.</div>';
    return;
  }

  btn.disabled = true;
  msg.innerHTML = '<div class="msg success">조회 중...</div>';

  apiGet({ action: 'getMySubmissions', studentId: id, studentName: name }).then(function (res) {
    btn.disabled = false;
    if (!res.valid) {
      msg.innerHTML = '<div class="msg error">' + res.message + '</div>';
      return;
    }
    msg.innerHTML = '';
    renderOwn(res.own);
    renderLearning(res.learning);
  }).catch(function (err) {
    btn.disabled = false;
    msg.innerHTML = '<div class="msg error">오류: ' + err.message + '</div>';
  });
}

function renderOwn(own) {
  var card = document.getElementById('ownCard');
  var content = document.getElementById('ownContent');
  card.classList.remove('hidden');

  if (!own) {
    content.innerHTML = '<div class="empty">아직 제출한 기록이 없습니다.</div>';
    return;
  }

  content.innerHTML =
    '<div class="meta">제출 시각: ' + own.timestamp + ' / 분과: ' + own.section + '</div>' +
    '<div class="field"><div class="field-label">빈칸 채우기</div>' + renderBlanksWithPrompts(own.section, own.blanks) + '</div>' +
    '<div class="field"><div class="field-label">💡 AI 교차 검증 기록</div><div class="field-value">' + escapeHtml_(own.aiCheck) + '</div></div>' +
    '<div class="field"><div class="field-label">➡️ 인과 단계 서술</div><div class="field-value">' + escapeHtml_(own.lifeAnswer) + '</div></div>';
}

function renderLearning(learning) {
  var card = document.getElementById('learningCard');
  var content = document.getElementById('learningContent');
  card.classList.remove('hidden');

  if (!learning || learning.length === 0) {
    content.innerHTML = '<div class="empty">아직 제출한 기록이 없습니다.</div>';
    return;
  }

  content.innerHTML = learning.map(function (item, idx) {
    return '<div class="learning-item' + (idx === 0 ? ' first' : '') + '">' +
      '<div class="meta">제출 시각: ' + item.timestamp + ' / 분과: ' + item.section + '</div>' +
      renderBlanksWithPrompts(item.section, item.blanks) +
      '</div>';
  }).join('');
}

function escapeHtml_(s) {
  var div = document.createElement('div');
  div.innerText = s || '';
  return div.innerHTML;
}
</script>
</body>
</html>
