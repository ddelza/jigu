<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>기후위기 해결 관점 게시판 — Padlet</title>
<style>
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --line: #e2e6f0;
    --accent: #2d6cdf;
    --eco: #1f8a4c;
    --tech: #7c3aed;
    --ethic: #d9822b;
    --text: #1c2238;
    --sub: #6b7384;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; }
  #app { min-height: 100vh; display: flex; flex-direction: column; }

  /* ===== 로그인 화면 ===== */
  #loginScreen {
    flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  #loginBox {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 32px 28px; width: 100%; max-width: 360px; box-shadow: 0 6px 24px rgba(20,30,60,.08);
    text-align: center;
  }
  #loginBox h1 { font-size: 19px; margin: 0 0 6px; }
  #loginBox p { font-size: 13px; color: var(--sub); margin: 0 0 20px; }
  #loginBox input {
    width: 100%; padding: 11px 12px; margin-bottom: 10px; border: 1px solid var(--line);
    border-radius: 8px; font-size: 14px;
  }
  #loginBox button {
    width: 100%; padding: 11px; margin-top: 8px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer;
  }
  #loginBox button:hover { background: #1f56b8; }
  #loginMsg { font-size: 13px; color: #c0392b; margin-top: 10px; min-height: 18px; }

  /* ===== 게시판 헤더 ===== */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; background: var(--card); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 20;
  }
  header h1 { font-size: 17px; margin: 0; }
  header h1 span { display: block; font-size: 12px; color: var(--sub); font-weight: normal; margin-top: 2px; }
  #whoami { font-size: 13px; color: var(--sub); text-align: right; }
  #whoami b { color: var(--text); }
  #logoutBtn { margin-left: 10px; font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: underline; }

  /* ===== 보드(3열) ===== */
  #board { flex: 1; display: flex; gap: 14px; padding: 16px; overflow-x: auto; align-items: flex-start; }
  .column { flex: 1; min-width: 280px; max-width: 420px; }
  .col-header {
    cursor: pointer; user-select: none; border-radius: 10px; padding: 12px 14px; font-weight: bold;
    font-size: 15px; color: #fff; display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 10px; transition: filter .15s;
  }
  .col-header:hover { filter: brightness(1.08); }
  .col-header.eco { background: var(--eco); }
  .col-header.tech { background: var(--tech); }
  .col-header.ethic { background: var(--ethic); }
  .col-count { font-size: 12px; font-weight: normal; opacity: .85; }

  .post-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 13px 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(20,30,60,.05);
  }
  .post-meta { font-size: 11.5px; color: var(--sub); margin-bottom: 6px; }
  .post-meta b { color: var(--text); }
  .post-field-label { font-size: 11.5px; font-weight: bold; color: var(--accent); margin-top: 8px; }
  .post-field-text { font-size: 13.5px; line-height: 1.55; margin-top: 2px; white-space: pre-wrap; word-break: break-word; }

  .reaction-row { display: flex; gap: 8px; margin-top: 10px; }
  .react-btn {
    border: 1px solid var(--line); background: #f7f8fb; border-radius: 999px; padding: 5px 11px;
    font-size: 12.5px; cursor: pointer; transition: .12s;
  }
  .react-btn:hover { background: #eef1f8; }
  .react-btn.active.like { background: #fff0e0; border-color: #f0a253; color: #b85c00; }
  .react-btn.active.curious { background: #eaf1ff; border-color: #7aa6ef; color: #1f56b8; }

  .comment-toggle { font-size: 12px; color: var(--accent); cursor: pointer; margin-top: 9px; display: inline-block; }
  .comment-box { margin-top: 8px; border-top: 1px dashed var(--line); padding-top: 8px; }
  .comment-item { font-size: 12.5px; margin-bottom: 6px; line-height: 1.45; }
  .comment-item b { color: var(--text); }
  .comment-item .ctime { color: #aab1c0; font-size: 11px; margin-left: 4px; }
  .comment-item.reply { margin-left: 18px; color: #555; }
  .comment-action { font-size: 11px; color: var(--accent); cursor: pointer; margin-left: 4px; }
  .comment-action.danger { color: #c0392b; }
  .comment-input-row.reply-input { margin-left: 18px; }
  .comment-input-row { display: flex; gap: 6px; margin-top: 6px; }
  .comment-input-row input {
    flex: 1; padding: 7px 9px; border: 1px solid var(--line); border-radius: 7px; font-size: 12.5px;
  }
  .comment-input-row button {
    padding: 7px 11px; border: none; border-radius: 7px; background: var(--accent); color: #fff;
    font-size: 12.5px; cursor: pointer;
  }
  .empty-col { font-size: 12.5px; color: var(--sub); text-align: center; padding: 20px 6px; }

  /* ===== 글쓰기 모달 ===== */
  #modalOverlay {
    position: fixed; inset: 0; background: rgba(15,20,40,.45); display: none;
    align-items: center; justify-content: center; z-index: 100; padding: 16px;
  }
  #modalOverlay.show { display: flex; }
  #modalBox {
    background: #fff; border-radius: 14px; padding: 24px; width: 100%; max-width: 520px;
    max-height: 88vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,.25);
  }
  #modalBox h2 { font-size: 17px; margin: 0 0 4px; }
  #modalBox .modal-sub { font-size: 12.5px; color: var(--sub); margin-bottom: 16px; }
  #modalBox label { font-size: 13.5px; font-weight: bold; display: block; margin: 14px 0 6px; }
  #modalBox .label-hint { font-size: 12px; font-weight: normal; color: var(--sub); display: block; margin-top: 2px; }
  #modalBox textarea {
    width: 100%; min-height: 90px; padding: 10px; border: 1px solid var(--line); border-radius: 8px;
    font-size: 13.5px; font-family: inherit; resize: vertical;
  }
  .modal-btn-row { display: flex; gap: 8px; margin-top: 18px; }
  .modal-btn-row button { flex: 1; padding: 11px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
  #modalCancelBtn { background: #eef0f5; color: #555; }
  #modalSubmitBtn { background: var(--accent); color: #fff; font-weight: bold; }
  #modalMsg { font-size: 12.5px; color: #c0392b; margin-top: 8px; min-height: 16px; }

  .hidden { display: none !important; }

  /* ===== 로딩 오버레이 ===== */
  #loadingOverlay {
    position: fixed; inset: 0; background: rgba(244,246,251,.92); z-index: 500;
    display: none; align-items: center; justify-content: center;
  }
  #loadingOverlay.show { display: flex; }
  #loadingBox { text-align: center; }
  #loadingSpinner {
    width: 56px; height: 56px; margin: 0 auto 18px; border-radius: 50%;
    border: 6px solid #d9e0f5; border-top-color: var(--accent);
    animation: loadingSpin .8s linear infinite;
  }
  @keyframes loadingSpin { to { transform: rotate(360deg); } }
  #loadingText {
    font-size: 28px; font-weight: 900; color: var(--accent); letter-spacing: 1px;
  }

  @media (max-width: 900px) {
    #board { flex-direction: column; }
    .column { max-width: 100%; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ===== 로그인 ===== -->
  <div id="loginScreen">
    <div id="loginBox">
      <h1>🗂️ 기후위기 해결 관점 게시판</h1>
      <p>학번과 이름을 입력하면 게시판에 입장합니다.</p>
      <input id="loginId" type="text" placeholder="학번 (예: 3101)" inputmode="numeric">
      <input id="loginName" type="text" placeholder="이름">
      <button id="loginBtn" onclick="login()">입장하기</button>
      <div id="loginMsg"></div>
    </div>
  </div>

  <!-- ===== 로딩 오버레이 ===== -->
  <div id="loadingOverlay">
    <div id="loadingBox">
      <div id="loadingSpinner"></div>
      <div id="loadingText">로딩중...</div>
    </div>
  </div>

  <!-- ===== 게시판 ===== -->
  <div id="boardScreen" class="hidden" style="display:flex; flex-direction:column; flex:1;">
    <header>
      <h1>🗂️ 기후위기 해결 관점 게시판
        <span>각 관점 제목을 눌러 글을 작성하고, 친구들 게시물에 반응·댓글을 남겨보세요.</span>
      </h1>
      <div id="whoami"></div>
    </header>
    <div id="board"></div>
  </div>

  <!-- ===== 글쓰기 모달 ===== -->
  <div id="modalOverlay">
    <div id="modalBox">
      <h2 id="modalTitle"></h2>
      <div class="modal-sub">아래 두 가지를 모두 작성해야 게시할 수 있어요.</div>

      <label>(1) 선택한 인과관계 설명하기
        <span class="label-hint">인과관계 배치 게임의 3단계(기상 재난) 또는 4단계(삶과 사회의 위협) 문제를 하나 선택하고, &lt;화석연료 사용&gt;으로부터 출발해서 그 문제가 발생하는 인과관계를 줄글로 서술하세요.</span>
      </label>
      <textarea id="causalInput" placeholder="예) 화석연료 사용으로 온실기체 배출량이 급증하고 지구 온난화가 심해지면서 → ... → 결국 ○○○ 문제가 발생합니다."></textarea>

      <label>(2) 내가 미국 대통령이라면?
        <span class="label-hint">내가 미국 대통령이고, 내가 선택한 관점(경제적/기술적/윤리적)에서 이 문제를 해결한다면 어떤 정책을 펼칠 수 있을까요?</span>
      </label>
      <textarea id="policyInput" placeholder="예) 저는 ○○ 정책을 시행하겠습니다. 왜냐하면..."></textarea>

      <div id="modalMsg"></div>
      <div class="modal-btn-row">
        <button id="modalCancelBtn" onclick="closeModal()">취소</button>
        <button id="modalSubmitBtn" onclick="submitPost()">게시하기</button>
      </div>
    </div>
  </div>

</div>

<script>
var APP_URL = 'https://script.google.com/macros/s/AKfycbwWjFVmcxHzg0GUIbySHl2orXll2siH1I5oAeZNP8VWmYSaVbQ5YOlYEe1o7X7-KcHQ/exec';

var PERSPECTIVES = [
  { key: '경제적 관점', cls: 'eco', emoji: '💰' },
  { key: '기술적 관점', cls: 'tech', emoji: '🛠️' },
  { key: '윤리적 관점', cls: 'ethic', emoji: '⚖️' }
];

var studentId = '';
var studentName = '';
var currentPosts = [];
var expandedComments = {};
var expandedReplyFor = {};
var composing = false;
var lastPostsJson = '';
var pollTimer = null;
var pendingPerspective = '';

function showLoading() { document.getElementById('loadingOverlay').classList.add('show'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

function apiGet(params, silent) {
  if (!silent) showLoading();
  var qs = Object.keys(params).map(function (k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k] == null ? '' : params[k]);
  }).join('&');
  return fetch(APP_URL + '?' + qs).then(function (r) { return r.json(); }).finally(function () {
    if (!silent) hideLoading();
  });
}
function apiPost(action, payload, silent) {
  if (!silent) showLoading();
  return fetch(APP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: action, payload: payload })
  }).then(function (r) { return r.json(); }).finally(function () {
    if (!silent) hideLoading();
  });
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ===================== 로그인 =====================
function login() {
  var id = document.getElementById('loginId').value.trim();
  var name = document.getElementById('loginName').value.trim();
  var msg = document.getElementById('loginMsg');
  if (!id || !name) { msg.textContent = '학번과 이름을 모두 입력해주세요.'; return; }

  msg.textContent = '확인 중...';
  apiGet({ action: 'verifyStudentOnly', studentId: id, studentName: name }).then(function (res) {
    if (!res.valid) { msg.textContent = '학번 또는 이름이 명단과 일치하지 않습니다. 다시 확인해주세요.'; return; }
    studentId = id; studentName = name;
    localStorage.setItem('padlet_student', JSON.stringify({ id: id, name: name }));
    enterBoard();
  }).catch(function () { msg.textContent = '서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.'; });
}

function enterBoard() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('boardScreen').classList.remove('hidden');
  document.getElementById('whoami').innerHTML =
    '<b>' + escapeHtml(studentName) + '</b>(' + escapeHtml(studentId) + ')님 환영합니다' +
    '<span id="logoutBtn" onclick="logout()">로그아웃</span>';
  renderColumnsShell();
  loadPosts(true);
  pollTimer = setInterval(function () { loadPosts(false); }, 4000);
}

function logout() {
  localStorage.removeItem('padlet_student');
  location.reload();
}

(function tryAutoLogin() {
  try {
    var saved = JSON.parse(localStorage.getItem('padlet_student') || 'null');
    if (saved && saved.id && saved.name) {
      document.getElementById('loginId').value = saved.id;
      document.getElementById('loginName').value = saved.name;
    }
  } catch (e) {}
})();

// ===================== 게시판 렌더 =====================
function renderColumnsShell() {
  var board = document.getElementById('board');
  board.innerHTML = PERSPECTIVES.map(function (p) {
    return '<div class="column" data-key="' + p.key + '">' +
      '<div class="col-header ' + p.cls + '" onclick="openModal(\'' + p.key + '\')">' +
        '<span>' + p.emoji + ' ' + p.key + ' +</span>' +
        '<span class="col-count" id="count-' + p.cls + '"></span>' +
      '</div>' +
      '<div class="posts" id="posts-' + p.cls + '"></div>' +
    '</div>';
  }).join('');
}

function renderBoard(posts) {
  currentPosts = posts;
  PERSPECTIVES.forEach(function (p) {
    var list = posts.filter(function (post) { return post.perspective === p.key; });
    document.getElementById('count-' + p.cls).textContent = list.length + '개';
    var container = document.getElementById('posts-' + p.cls);
    if (list.length === 0) {
      container.innerHTML = '<div class="empty-col">아직 게시물이 없어요.<br>제목을 눌러 첫 게시물을 올려보세요!</div>';
      return;
    }
    container.innerHTML = list.map(renderPostCard).join('');
  });
}

function renderCommentActions(post, c) {
  var actions = '<span class="comment-action" onclick="toggleReplyBox(\'' + c.id + '\')">답글</span>';
  if (c.studentId === studentId) {
    actions += ' <span class="comment-action danger" onclick="deleteComment(\'' + post.id + '\',\'' + c.id + '\')">삭제</span>';
  }
  return actions;
}

function renderReplyBox(post, parentId) {
  if (!expandedReplyFor[parentId]) return '';
  return '<div class="comment-input-row reply-input">' +
    '<input type="text" id="reply-input-' + parentId + '" placeholder="답글을 남겨보세요" onkeydown="if(event.key===\'Enter\')submitReply(\'' + post.id + '\',\'' + parentId + '\')" onfocus="composing=true" onblur="composing=false">' +
    '<button onclick="submitReply(\'' + post.id + '\',\'' + parentId + '\')">등록</button>' +
  '</div>';
}

function renderComments(post) {
  var topLevel = post.comments.filter(function (c) { return !c.parentId; });
  if (topLevel.length === 0) {
    return '<div style="font-size:12px;color:var(--sub);">아직 댓글이 없어요. 질문을 남겨보세요!</div>';
  }
  return topLevel.map(function (c) {
    var replies = post.comments.filter(function (r) { return r.parentId === c.id; });
    var html = '<div class="comment-item">💬 <b>' + escapeHtml(c.studentName) + '</b>: ' +
      escapeHtml(c.text) + '<span class="ctime">' + escapeHtml(c.time) + '</span> ' +
      renderCommentActions(post, c) + '</div>';
    html += replies.map(function (r) {
      return '<div class="comment-item reply">↳ <b>' + escapeHtml(r.studentName) + '</b>: ' +
        escapeHtml(r.text) + '<span class="ctime">' + escapeHtml(r.time) + '</span> ' +
        renderCommentActions(post, r) + '</div>';
    }).join('');
    html += renderReplyBox(post, c.id);
    return html;
  }).join('');
}

function renderPostCard(post) {
  var expanded = !!expandedComments[post.id];
  var totalCommentCount = post.comments.length;
  var commentsHtml = '';
  if (expanded) {
    commentsHtml = '<div class="comment-box">' +
      renderComments(post) +
      '<div class="comment-input-row">' +
        '<input type="text" id="comment-input-' + post.id + '" placeholder="질문형 댓글을 남겨보세요" onkeydown="if(event.key===\'Enter\')submitComment(\'' + post.id + '\')" onfocus="composing=true" onblur="composing=false">' +
        '<button onclick="submitComment(\'' + post.id + '\')">등록</button>' +
      '</div>' +
    '</div>';
  }

  return '<div class="post-card">' +
    '<div class="post-meta"><b>' + escapeHtml(post.studentName) + '</b> · ' + escapeHtml(post.timestamp) + '</div>' +
    '<div class="post-field-label">🔗 인과관계</div>' +
    '<div class="post-field-text">' + escapeHtml(post.causal) + '</div>' +
    '<div class="post-field-label">🏛️ 나의 정책</div>' +
    '<div class="post-field-text">' + escapeHtml(post.policy) + '</div>' +
    '<div class="reaction-row">' +
      '<button class="react-btn like' + (post.myReaction === 'like' ? ' active like' : '') + '" onclick="react(\'' + post.id + '\',\'like\')">👍 좋아요 ' + post.likeCount + '</button>' +
      '<button class="react-btn curious' + (post.myReaction === 'curious' ? ' active curious' : '') + '" onclick="react(\'' + post.id + '\',\'curious\')">🤔 궁금해요 ' + post.curiousCount + '</button>' +
    '</div>' +
    '<div class="comment-toggle" onclick="toggleComments(\'' + post.id + '\')">💬 댓글 ' + totalCommentCount + '개 ' + (expanded ? '숨기기 ▲' : '보기 ▼') + '</div>' +
    commentsHtml +
  '</div>';
}

// ===================== 데이터 로드(폴링) =====================
function loadPosts(force) {
  apiGet({ action: 'getPadletPosts', studentId: studentId }, !force).then(function (res) {
    if (!res.valid) return;
    var json = JSON.stringify(res.posts);
    if (!force && (composing || json === lastPostsJson)) return;
    lastPostsJson = json;
    renderBoard(res.posts);
  }).catch(function () {});
}

// ===================== 글쓰기 모달 =====================
function openModal(perspectiveKey) {
  pendingPerspective = perspectiveKey;
  document.getElementById('modalTitle').textContent = '✍️ ' + perspectiveKey + ' 게시물 작성';
  document.getElementById('causalInput').value = '';
  document.getElementById('policyInput').value = '';
  document.getElementById('modalMsg').textContent = '';
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function submitPost() {
  var causal = document.getElementById('causalInput').value.trim();
  var policy = document.getElementById('policyInput').value.trim();
  var msg = document.getElementById('modalMsg');

  if (causal.length < 10) { msg.textContent = '(1) 인과관계 설명을 10자 이상 작성해주세요.'; return; }
  if (policy.length < 10) { msg.textContent = '(2) 정책 제안을 10자 이상 작성해주세요.'; return; }

  msg.textContent = '게시 중...';
  apiPost('submitPadletPost', {
    studentId: studentId, studentName: studentName,
    perspective: pendingPerspective, causal: causal, policy: policy
  }).then(function (res) {
    if (!res.success) { msg.textContent = res.message || '게시에 실패했습니다.'; return; }
    closeModal();
    loadPosts(true);
  }).catch(function () { msg.textContent = '서버 연결에 실패했습니다.'; });
}

// ===================== 반응 =====================
function react(postId, type) {
  apiPost('togglePadletReaction', {
    studentId: studentId, studentName: studentName, postId: postId, type: type
  }).then(function (res) {
    if (!res.success) { alert(res.message || '반응 처리에 실패했습니다.'); return; }
    currentPosts.forEach(function (p) {
      if (p.id === postId) { p.likeCount = res.likeCount; p.curiousCount = res.curiousCount; p.myReaction = res.myReaction; }
    });
    renderBoard(currentPosts);
    lastPostsJson = JSON.stringify(currentPosts);
  }).catch(function () { alert('서버 연결에 실패했습니다.'); });
}

// ===================== 댓글 =====================
function toggleComments(postId) {
  expandedComments[postId] = !expandedComments[postId];
  renderBoard(currentPosts);
}

function submitComment(postId) {
  var input = document.getElementById('comment-input-' + postId);
  var text = input.value.trim();
  if (text.length < 2) return;
  apiPost('addPadletComment', {
    studentId: studentId, studentName: studentName, postId: postId, text: text
  }).then(function (res) {
    if (!res.success) { alert(res.message || '댓글 등록에 실패했습니다.'); return; }
    currentPosts.forEach(function (p) { if (p.id === postId) p.comments = res.comments; });
    composing = false;
    renderBoard(currentPosts);
    lastPostsJson = JSON.stringify(currentPosts);
  }).catch(function () { alert('서버 연결에 실패했습니다.'); });
}

function toggleReplyBox(commentId) {
  expandedReplyFor[commentId] = !expandedReplyFor[commentId];
  renderBoard(currentPosts);
}

function submitReply(postId, parentId) {
  var input = document.getElementById('reply-input-' + parentId);
  var text = input.value.trim();
  if (text.length < 2) return;
  apiPost('addPadletComment', {
    studentId: studentId, studentName: studentName, postId: postId, text: text, parentId: parentId
  }).then(function (res) {
    if (!res.success) { alert(res.message || '답글 등록에 실패했습니다.'); return; }
    currentPosts.forEach(function (p) { if (p.id === postId) p.comments = res.comments; });
    composing = false;
    expandedReplyFor[parentId] = false;
    renderBoard(currentPosts);
    lastPostsJson = JSON.stringify(currentPosts);
  }).catch(function () { alert('서버 연결에 실패했습니다.'); });
}

function deleteComment(postId, commentId) {
  if (!confirm('이 댓글을 삭제할까요? (답글이 있다면 함께 삭제됩니다)')) return;
  apiPost('deletePadletComment', {
    studentId: studentId, studentName: studentName, postId: postId, commentId: commentId
  }).then(function (res) {
    if (!res.success) { alert(res.message || '댓글 삭제에 실패했습니다.'); return; }
    currentPosts.forEach(function (p) { if (p.id === postId) p.comments = res.comments; });
    renderBoard(currentPosts);
    lastPostsJson = JSON.stringify(currentPosts);
  }).catch(function () { alert('서버 연결에 실패했습니다.'); });
}
